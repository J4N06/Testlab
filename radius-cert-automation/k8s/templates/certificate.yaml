apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.customer.name }}-radius-cert
  namespace: {{ .Values.customer.namespace }}
spec:
  # Kubernetes Secret in dem cert-manager tls.crt und tls.key ablegt
  secretName: {{ .Values.customer.name }}-tls

  duration: {{ .Values.cert.duration }}
  renewBefore: {{ .Values.cert.renewBefore }}

  subject:
    organizations:
      - {{ .Values.customer.name }}

  commonName: {{ .Values.customer.domain }}
  dnsNames:
    - {{ .Values.customer.domain }}

  # Interne CA — kein Let's Encrypt
  issuerRef:
    name: {{ .Values.cert.issuerRef.name }}
    kind: {{ .Values.cert.issuerRef.kind }}
