apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerting
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/J4N06/Testlab.git
    targetRevision: HEAD
    path: k3s-ansible/manifests/alerting
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
