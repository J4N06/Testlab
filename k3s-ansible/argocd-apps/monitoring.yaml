apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          service:
            type: NodePort
            nodePort: 30300
          adminPassword: admin
          sidecar:
            dashboards:
              enabled: true
        prometheus:
          prometheusSpec:
            retention: 7d
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: teams
            receivers:
              - name: teams
                webhook_configs:
                  - url: http://prometheus-msteams:2000/alertmanager
                    send_resolved: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
