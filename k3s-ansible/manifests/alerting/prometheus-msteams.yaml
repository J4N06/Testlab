---
apiVersion: v1
kind: ConfigMap
metadata:
  name: teams-proxy-script
  namespace: monitoring
data:
  proxy.py: |
    from flask import Flask, request
    import requests, os

    app = Flask(__name__)
    WEBHOOK = os.environ["TEAMS_WEBHOOK"]

    @app.route("/alertmanager", methods=["POST"])
    def alert():
        data = request.get_json()
        for a in data.get("alerts", []):
            status   = a["status"]
            name     = a["labels"].get("alertname", "Alert")
            severity = a["labels"].get("severity", "")
            ns       = a["labels"].get("namespace", "")
            text     = a.get("annotations", {}).get("description") or \
                       a.get("annotations", {}).get("summary", "")
            payload = {
                "@type": "MessageCard",
                "@context": "http://schema.org/extensions",
                "themeColor": "FF0000" if status == "firing" else "00FF00",
                "summary": name,
                "sections": [{
                    "activityTitle": f"**{name}**",
                    "activitySubtitle": f"Status: {status.upper()} | Severity: {severity} | Namespace: {ns}",
                    "text": text
                }]
            }
            requests.post(WEBHOOK, json=payload, timeout=10)
        return "OK", 200

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=2000)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: teams-proxy-config
  namespace: monitoring
data:
  TEAMS_WEBHOOK: "https://iseag.webhook.office.com/webhookb2/31c4685b-9076-46cb-a17d-f1070279a54c@fc39838d-e703-4dd1-b7ce-49489159ea03/IncomingWebhook/dc1cae102f6444518109196f1c2ce045/75ad0cd4-2c7d-4096-8ee8-cdbd0f8c2c4c/V2OV4rMX62TL5xR5RIiNEWfO25iyUKH-1rC62aOjpipvU1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-msteams
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-msteams
  template:
    metadata:
      labels:
        app: prometheus-msteams
    spec:
      containers:
        - name: teams-proxy
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - pip install flask requests -q && python /app/proxy.py
          ports:
            - containerPort: 2000
          envFrom:
            - configMapRef:
                name: teams-proxy-config
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: teams-proxy-script
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-msteams
  namespace: monitoring
spec:
  selector:
    app: prometheus-msteams
  ports:
    - port: 2000
      targetPort: 2000
