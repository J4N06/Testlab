---
- name: ArgoCD Namespace erstellen
  ansible.builtin.command:
    cmd: kubectl create namespace argocd
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: "'created' in ns_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: ArgoCD installieren
  ansible.builtin.command:
    cmd: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  register: argocd_install
  changed_when: "'created' in argocd_install.stdout or 'configured' in argocd_install.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Warten bis ArgoCD Server bereit ist
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/argocd-server -n argocd --timeout=300s
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: ArgoCD Service auf NodePort setzen
  ansible.builtin.command:
    cmd: >-
      kubectl patch svc argocd-server -n argocd -p
      {"spec":{"type":"NodePort","ports":[{"name":"http","port":80,"targetPort":8080,"nodePort":30080},{"name":"https","port":443,"targetPort":8080,"nodePort":30443}]}}
  changed_when: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Warten bis ArgoCD Secret verfügbar ist
  ansible.builtin.command:
    cmd: kubectl -n argocd get secret argocd-initial-admin-secret
  register: secret_check
  until: secret_check.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: ArgoCD initiales Admin-Passwort auslesen
  ansible.builtin.shell:
    cmd: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
  register: argocd_password
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: ArgoCD Zugangsdaten anzeigen
  ansible.builtin.debug:
    msg:
      - "========================================"
      - "ArgoCD URL  : https://{{ k3s_master_ip }}:30443"
      - "Benutzer    : admin"
      - "Passwort    : {{ argocd_password.stdout }}"
      - "========================================"
