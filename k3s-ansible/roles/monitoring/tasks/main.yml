---
- name: Bestehenden Helm-Release entfernen falls vorhanden
  ansible.builtin.command:
    cmd: helm uninstall kube-prometheus-stack --namespace monitoring
  register: helm_uninstall
  failed_when: helm_uninstall.rc != 0 and 'not found' not in helm_uninstall.stderr
  changed_when: helm_uninstall.rc == 0
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: ArgoCD Application für Monitoring deployen
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/argocd-apps/monitoring.yaml"
    dest: /tmp/argocd-monitoring.yaml
    mode: "0644"

- name: ArgoCD Application anwenden
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/argocd-monitoring.yaml
  register: app_result
  changed_when: "'configured' in app_result.stdout or 'created' in app_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Warten bis Grafana bereit ist
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/kube-prometheus-stack-grafana -n monitoring --timeout=300s
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Dashboard JSON auf Master kopieren
  ansible.builtin.copy:
    src: k3s-cluster-dashboard.json
    dest: /tmp/k3s-cluster-dashboard.json
    mode: "0644"

- name: Custom Dashboard als ConfigMap deployen
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap k3s-cluster-dashboard \
        --from-file=k3s-cluster-dashboard.json=/tmp/k3s-cluster-dashboard.json \
        --namespace monitoring \
        --dry-run=client -o yaml | \
      kubectl label --local -f - grafana_dashboard=1 -o yaml | \
      kubectl apply -f -
  changed_when: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Monitoring Zugangsdaten anzeigen
  ansible.builtin.debug:
    msg:
      - "========================================"
      - "Grafana URL  : http://{{ k3s_master_ip }}:30300"
      - "Benutzer     : admin"
      - "Passwort     : admin"
      - "========================================"
