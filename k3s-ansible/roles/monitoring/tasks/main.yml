---
- name: Prüfen ob Helm bereits installiert ist
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_binary

- name: Helm installieren
  ansible.builtin.shell:
    cmd: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  when: not helm_binary.stat.exists
  changed_when: true

- name: prometheus-community Helm-Repo hinzufügen
  ansible.builtin.command:
    cmd: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  register: repo_result
  changed_when: "'has been added' in repo_result.stdout"
  failed_when: repo_result.rc != 0 and 'already exists' not in repo_result.stderr
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Helm Repos aktualisieren
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Monitoring Namespace erstellen
  ansible.builtin.command:
    cmd: kubectl create namespace monitoring
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: "'created' in ns_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: kube-prometheus-stack installieren
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install kube-prometheus-stack
      prometheus-community/kube-prometheus-stack
      --namespace monitoring
      --set grafana.service.type=NodePort
      --set grafana.service.nodePort=30300
      --set grafana.adminPassword=admin
      --set prometheus.prometheusSpec.retention=7d
      --timeout 10m
      --wait
  register: helm_result
  changed_when: "'deployed' in helm_result.stdout or 'upgraded' in helm_result.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Dashboard JSON auf Master kopieren
  ansible.builtin.copy:
    src: k3s-cluster-dashboard.json
    dest: /tmp/k3s-cluster-dashboard.json
    mode: "0644"

- name: Custom Dashboard als ConfigMap deployen
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap k3s-cluster-dashboard \
        --from-file=k3s-cluster-dashboard.json=/tmp/k3s-cluster-dashboard.json \
        --namespace monitoring \
        --dry-run=client -o yaml | \
      kubectl label --local -f - grafana_dashboard=1 -o yaml | \
      kubectl apply -f -
  changed_when: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Monitoring Zugangsdaten anzeigen
  ansible.builtin.debug:
    msg:
      - "========================================"
      - "Grafana URL  : http://{{ k3s_master_ip }}:30300"
      - "Benutzer     : admin"
      - "Passwort     : admin"
      - "========================================"
